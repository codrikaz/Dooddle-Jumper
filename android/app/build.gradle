plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def signingValue = { envName, propertyName ->
    def envValue = System.getenv(envName)
    return envValue != null && !envValue.trim().isEmpty() ? envValue : keystoreProperties[propertyName]
}


android {
    namespace "com.codrikaz.hoplet"
    compileSdkVersion 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.codrikaz.hoplet"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // Required for 16 KB page size support
    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    signingConfigs {
        release {
            keyAlias signingValue('ANDROID_KEY_ALIAS', 'keyAlias')
            keyPassword signingValue('ANDROID_KEY_PASSWORD', 'keyPassword')
            def storeFilePath = signingValue('ANDROID_STORE_FILE', 'storeFile')
            storeFile storeFilePath ? file(storeFilePath) : null
            storePassword signingValue('ANDROID_STORE_PASSWORD', 'storePassword')
        }
    }
    buildTypes {
        release {
            debuggable=false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
}
